name: Build Services

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]  
jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Run Build
        run: npm run build